<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReelHK</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script type="module" crossorigin src="./assets/index-DE56Pd2R.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DgNIWs2U.css?v=2">
    <style>
      /* Lightbox styles */
      .reelhk-lightbox {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.95);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .reelhk-lightbox.active {
        display: flex;
      }
      .reelhk-lightbox-content {
        position: relative;
        max-width: 1000px;
        width: 100%;
      }
      .reelhk-lightbox-close {
        position: absolute;
        top: -50px;
        right: 0;
        color: #fff;
        font-size: 48px;
        cursor: pointer;
        background: none;
        border: none;
        line-height: 1;
        z-index: 10000;
        padding: 10px;
      }
      .reelhk-lightbox-close:hover {
        color: #ccc;
      }
      .reelhk-lightbox video {
        width: 100%;
        border-radius: 12px;
        max-height: 80vh;
      }
      .back-hint {
        position: absolute;
        bottom: -40px;
        left: 50%;
        transform: translateX(-50%);
        color: #888;
        font-size: 14px;
      }
      /* Click cursor on portfolio items */
      [class*="portfolio"], [class*="work"], .group {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Lightbox -->
    <div class="reelhk-lightbox" id="reelhkLightbox">
      <div class="reelhk-lightbox-content">
        <button class="reelhk-lightbox-close" onclick="closeReelhkLightbox()">&times;</button>
        <video id="reelhkVideo" controls autoplay>
          <source src="" type="video/mp4">
        </video>
        <div class="back-hint">Click anywhere outside video to go back</div>
      </div>
    </div>

    <script>
      // Video mapping based on text content
      const videoMap = {
        '餐飲美食': 'work-fnb.mp4',
        '餐飲': 'work-fnb.mp4',
        '美食': 'work-fnb.mp4',
        '茶餐廳': 'work-fnb.mp4',
        '餐廳': 'work-fnb.mp4',
        '飲食': 'work-fnb.mp4',
        'F&B': 'work-fnb.mp4',
        'fnb': 'work-fnb.mp4',
        'fn&b': 'work-fnb.mp4',
        '手機應用': 'work_app1.mp4',
        '手機': 'work_app1.mp4',
        '應用': 'work_app1.mp4',
        'App': 'work_app1.mp4',
        'app': 'work_app1.mp4',
        '零售時尚': 'work_fashion.mp4',
        '零售': 'work_fashion.mp4',
        '時尚': 'work_fashion.mp4',
        'fashion': 'work_fashion.mp4',
        '生活方式': 'work_lifestyle.mp4',
        '生活': 'work_lifestyle.mp4',
        'lifestyle': 'work_lifestyle.mp4',
        '美容護理': 'work_skincare.mp4',
        '美容': 'work_skincare.mp4',
        '護理': 'work_skincare.mp4',
        'skincare': 'work_skincare.mp4',
        '科技產品': 'work_tech.mp4',
        '科技': 'work_tech.mp4',
        '產品': 'work_tech.mp4',
        'tech': 'work_tech.mp4'
      };

      const lightbox = document.getElementById('reelhkLightbox');
      const videoPlayer = document.getElementById('reelhkVideo');

      function openReelhkLightbox(videoSrc) {
        console.log('Opening video:', videoSrc);
        videoPlayer.src = videoSrc;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeReelhkLightbox() {
        console.log('Closing lightbox');
        lightbox.classList.remove('active');
        videoPlayer.pause();
        videoPlayer.src = '';
        document.body.style.overflow = '';
      }

      // Close ONLY when clicking the dark background (lightbox itself), not the content
      lightbox.addEventListener('click', (e) => {
        // Only close if clicked directly on the lightbox background (the dark overlay)
        if (e.target === lightbox) {
          closeReelhkLightbox();
        }
      });

      // Close on ESC key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeReelhkLightbox();
      });

      // Function to find video for an element
      function findVideoForElement(element) {
        // Get all text from this element and children
        const text = element.innerText || element.textContent || '';
        const lowerText = text.toLowerCase();
        
        // Check exact matches first
        for (const [key, video] of Object.entries(videoMap)) {
          if (text.includes(key)) {
            console.log('Found video for:', key, '->', video);
            return video;
          }
        }
        
        // Check lowercase matches
        for (const [key, video] of Object.entries(videoMap)) {
          if (lowerText.includes(key.toLowerCase())) {
            console.log('Found video (lowercase) for:', key, '->', video);
            return video;
          }
        }
        
        return null;
      }

      // Find all clickable portfolio items
      function findPortfolioItems() {
        // Get all elements and check their text content
        const allElements = document.querySelectorAll('*');
        const portfolioItems = [];
        
        allElements.forEach(el => {
          // Skip script, style, meta tags
          if (['SCRIPT', 'STYLE', 'META', 'LINK', 'HEAD'].includes(el.tagName)) return;
          
          const video = findVideoForElement(el);
          if (video && !portfolioItems.find(item => item.element === el)) {
            // Find the outermost container that has this text
            let container = el;
            let parent = el.parentElement;
            while (parent && parent !== document.body) {
              const parentVideo = findVideoForElement(parent);
              if (parentVideo === video && parent.innerText === el.innerText) {
                container = parent;
                parent = parent.parentElement;
              } else {
                break;
              }
            }
            
            portfolioItems.push({ element: container, video: video });
          }
        });
        
        return portfolioItems;
      }

      // Add click handlers
      function addClickHandlers() {
        const items = findPortfolioItems();
        console.log('Found portfolio items:', items.length);
        
        items.forEach(({ element, video }) => {
          if (element.dataset.reelhkClickAdded) return;
          
          element.style.cursor = 'pointer';
          element.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            console.log('Clicked:', video);
            openReelhkLightbox(video);
          });
          element.dataset.reelhkClickAdded = 'true';
          console.log('Added click handler for:', video);
        });
      }

      // Watch for DOM changes
      const observer = new MutationObserver((mutations) => {
        addClickHandlers();
      });

      // Start when ready
      function init() {
        observer.observe(document.body, { childList: true, subtree: true });
        addClickHandlers();
        setTimeout(addClickHandlers, 500);
        setTimeout(addClickHandlers, 1500);
        setTimeout(addClickHandlers, 3000);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }

      // Periodic check
      setInterval(addClickHandlers, 3000);
    </script>
  </body>
</html>
