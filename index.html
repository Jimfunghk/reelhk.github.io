<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReelHK</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script type="module" crossorigin src="./assets/index-DE56Pd2R.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DgNIWs2U.css?v=3">
    <style>
      /* Lightbox styles */
      .reelhk-lightbox {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.95);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .reelhk-lightbox.active {
        display: flex;
      }
      .reelhk-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }
      .reelhk-lightbox-close {
        position: fixed;
        top: 20px;
        right: 20px;
        color: #fff;
        font-size: 48px;
        cursor: pointer;
        background: none;
        border: none;
        line-height: 1;
        z-index: 3;
        padding: 10px;
      }
      .reelhk-lightbox-close:hover {
        color: #ccc;
      }
      .reelhk-lightbox video {
        max-width: 90%;
        max-height: 80vh;
        border-radius: 12px;
        z-index: 2;
        position: relative;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Lightbox -->
    <div class="reelhk-lightbox" id="reelhkLightbox">
      <div class="reelhk-overlay" onclick="closeReelhkLightbox()"></div>
      <button class="reelhk-lightbox-close" onclick="closeReelhkLightbox()">&times;</button>
      <video id="reelhkVideo" controls autoplay></video>
    </div>

    <script>
      // Image filename to video mapping
      const imageToVideo = {
        'work-app': 'work_app1.mp4',
        'work-beauty': 'work_skincare.mp4', 
        'work-lifestyle': 'work_lifestyle.mp4',
        'work-retail': 'work_fashion.mp4',
        'work-tech': 'work_tech.mp4',
        'work-fnb': 'work_food.mp4'
      };

      const lightbox = document.getElementById('reelhkLightbox');
      const videoPlayer = document.getElementById('reelhkVideo');

      function openReelhkLightbox(videoSrc) {
        console.log('Opening video:', videoSrc);
        videoPlayer.src = videoSrc;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeReelhkLightbox() {
        console.log('Closing lightbox');
        lightbox.classList.remove('active');
        videoPlayer.pause();
        videoPlayer.src = '';
        document.body.style.overflow = '';
      }

      // Close on ESC key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeReelhkLightbox();
      });

      // Find video based on image src or nearby text
      function findVideoForCard(img) {
        const src = img.src || '';
        const alt = img.alt || '';
        
        // Check image filename first
        for (const [key, video] of Object.entries(imageToVideo)) {
          if (src.includes(key) || alt.includes(key)) {
            return video;
          }
        }
        
        // Check parent elements for text clues
        let el = img.parentElement;
        for (let i = 0; i < 5 && el; i++) {
          const text = (el.innerText || el.textContent || '').toLowerCase();
          
          if (text.includes('餐飲') || text.includes('美食') || text.includes('fnb') || text.includes('food')) {
            return 'work_food.mp4';
          }
          if (text.includes('手機') || text.includes('app')) {
            return 'work_app1.mp4';
          }
          if (text.includes('零售') || text.includes('時尚') || text.includes('fashion')) {
            return 'work_fashion.mp4';
          }
          if (text.includes('生活') || text.includes('lifestyle')) {
            return 'work_lifestyle.mp4';
          }
          if (text.includes('美容') || text.includes('護理') || text.includes('beauty') || text.includes('skincare')) {
            return 'work_skincare.mp4';
          }
          if (text.includes('科技') || text.includes('產品') || text.includes('tech')) {
            return 'work_tech.mp4';
          }
          
          el = el.parentElement;
        }
        
        return null;
      }

      // Add click handlers
      function addClickHandlers() {
        const images = document.querySelectorAll('img');
        
        images.forEach(img => {
          if (img.dataset.reelhkHandled) return;
          
          const video = findVideoForCard(img);
          if (!video) return;
          
          // Find clickable container
          let container = img;
          let parent = img.parentElement;
          for (let i = 0; i < 3 && parent; i++) {
            const rect = parent.getBoundingClientRect();
            if (rect.width > 150 && rect.height > 100) {
              container = parent;
              break;
            }
            parent = parent.parentElement;
          }
          
          if (container.dataset.reelhkHandled) return;
          
          container.style.cursor = 'pointer';
          container.addEventListener('click', (e) => {
            if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;
            e.preventDefault();
            e.stopPropagation();
            console.log('Playing:', video);
            openReelhkLightbox(video);
          });
          
          container.dataset.reelhkHandled = 'true';
          img.dataset.reelhkHandled = 'true';
          console.log('Handler added:', video);
        });
      }

      // Initialize
      function init() {
        addClickHandlers();
        setTimeout(addClickHandlers, 1000);
        setTimeout(addClickHandlers, 2500);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }

      // Watch for DOM changes
      new MutationObserver(() => addClickHandlers()).observe(document.body, { 
        childList: true, 
        subtree: true 
      });

      // AI Production Card Text Replacement
      const aiProductionText = {
        tc: { title: 'AI 無界創作', desc: '想像即現實，品質即承諾' },
        sc: { title: 'AI 无界创作', desc: '想象即现实，品质即承诺' },
        en: { title: 'AI Production', desc: 'Where imagination meets reality' }
      };

      let currentLang = 'tc';

      function updateAICard() {
        // Find all cards and check their content
        const cards = document.querySelectorAll('[class*="card"], [class*="service"], article, .group');
        
        cards.forEach(card => {
          const cardText = card.textContent || '';
          
          // Check if this is the "Unlimited Revisions" card
          if (cardText.includes('無限修改') || cardText.includes('无限修改') || cardText.toLowerCase().includes('unlimited')) {
            if (card.dataset.aiCardUpdated) return;
            
            // Find the title (usually h3, h4, or first bold element)
            const titleEl = card.querySelector('h3, h4, [class*="title"], strong, b') || 
                           Array.from(card.children).find(e => {
                             const style = window.getComputedStyle(e);
                             return parseInt(style.fontSize) >= 16 && e.textContent.length < 50;
                           });
            
            // Find the description (usually p or smaller text)
            const descEl = card.querySelector('p, [class*="desc"], [class*="text"]') ||
                          Array.from(card.children).find(e => {
                            const text = e.textContent || '';
                            return text.includes('修改') || text.includes('满意') || text.includes('satisfied');
                          });
            
            if (titleEl) {
              titleEl.textContent = aiProductionText[currentLang].title;
              titleEl.dataset.aiTitle = 'true';
            }
            if (descEl && descEl !== titleEl) {
              descEl.textContent = aiProductionText[currentLang].desc;
              descEl.dataset.aiDesc = 'true';
            }
            
            // Add language switcher
            if (!card.querySelector('.ai-lang-switcher')) {
              const switcher = document.createElement('div');
              switcher.className = 'ai-lang-switcher';
              switcher.style.cssText = 'margin-top:12px;display:flex;gap:8px;';
              switcher.innerHTML = `
                <button style="background:transparent;border:1px solid #444;color:#666;padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;" onclick="switchAILang('tc')">繁</button>
                <button style="background:transparent;border:1px solid #444;color:#666;padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;" onclick="switchAILang('sc')">简</button>
                <button style="background:transparent;border:1px solid #444;color:#666;padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;" onclick="switchAILang('en')">EN</button>
              `;
              card.appendChild(switcher);
            }
            
            card.dataset.aiCardUpdated = 'true';
          }
        });
      }

      window.switchAILang = function(lang) {
        currentLang = lang;
        document.querySelectorAll('[data-ai-title]').forEach(el => {
          el.textContent = aiProductionText[lang].title;
        });
        document.querySelectorAll('[data-ai-desc]').forEach(el => {
          el.textContent = aiProductionText[lang].desc;
        });
      };

      // Run AI card update periodically
      setInterval(updateAICard, 1000);
      setTimeout(updateAICard, 500);
    </script>
  </body>
</html>
