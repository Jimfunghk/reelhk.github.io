<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelHK - 專業影片製作</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            color: #fff;
        }
        .header {
            padding: 40px 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            color: #888;
            font-size: 16px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
        }
        .card {
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(255, 107, 53, 0.2);
        }
        .card-image {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .card:hover .card-image {
            transform: scale(1.05);
        }
        .card-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: #ff4444;
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
        }
        .card-content {
            padding: 20px;
        }
        .card-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .card-desc {
            color: #888;
            font-size: 14px;
        }
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ReelHK</h1>
        <p>專業影片製作服務</p>
    </div>
    
    <div class="container">
        <div class="grid">
            <a href="/work-fnb.html" class="card">
                <img src="work-fnb.jpg" alt="餐飲美食" class="card-image" onerror="this.src='hero-bg.jpg'">
                <div class="card-badge">營業中</div>
                <div class="card-content">
                    <div class="card-title">餐飲美食</div>
                    <div class="card-desc">茶餐廳宣傳短片</div>
                </div>
            </a>
            
            <a href="/work-app.html" class="card">
                <img src="work-app.jpg" alt="手機應用" class="card-image">
                <div class="card-badge">營業中</div>
                <div class="card-content">
                    <div class="card-title">手機應用</div>
                    <div class="card-desc">App 功能展示</div>
                </div>
            </a>
            
            <a href="#" class="card">
                <img src="work-retail.jpg" alt="零售時尚" class="card-image">
                <div class="card-badge">營業中</div>
                <div class="card-content">
                    <div class="card-title">零售時尚</div>
                    <div class="card-desc">產品推廣影片</div>
                </div>
            </a>
            
            <a href="#" class="card">
                <img src="work-lifestyle.jpg" alt="生活方式" class="card-image">
                <div class="card-badge">營業中</div>
                <div class="card-content">
                    <div class="card-title">生活方式</div>
                    <div class="card-desc">品牌故事影片</div>
                </div>
            </a>
            
            <a href="#" class="card">
                <img src="work-beauty.jpg" alt="美容護理" class="card-image">
                <div class="card-badge">營業中</div>
                <div class="card-content">
                    <div class="card-title">美容護理</div>
                    <div class="card-desc">服務介紹短片</div>
                </div>
            </a>
            
            <a href="#" class="card">
                <img src="work-tech.jpg" alt="科技產品" class="card-image">
                <div class="card-badge">營業中</div>
                <div class="card-content">
                    <div class="card-title">科技產品</div>
                    <div class="card-desc">產品開箱影片</div>
                </div>
            </a>
        </div>
    </div>
    
    <div class="footer">
        <p>© 2024 ReelHK. All rights reserved.</p>
    </div>
</body>
</html>
