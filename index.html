<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReelHK</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script type="module" crossorigin src="./assets/index-DE56Pd2R.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DgNIWs2U.css?v=3">
    <style>
      /* Lightbox styles */
      .reelhk-lightbox {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.95);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .reelhk-lightbox.active {
        display: flex;
      }
      .reelhk-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }
      .reelhk-lightbox-close {
        position: fixed;
        top: 20px;
        right: 20px;
        color: #fff;
        font-size: 48px;
        cursor: pointer;
        background: none;
        border: none;
        line-height: 1;
        z-index: 3;
        padding: 10px;
      }
      .reelhk-lightbox-close:hover {
        color: #ccc;
      }
      .reelhk-lightbox video {
        max-width: 90%;
        max-height: 80vh;
        border-radius: 12px;
        z-index: 2;
        position: relative;
      }
      /* AI Production Section */
      .ai-production {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: rgba(0,0,0,0.9);
        border: 1px solid #333;
        border-radius: 12px;
        padding: 16px 20px;
        z-index: 100;
        max-width: 280px;
      }
      .ai-production h3 {
        color: #fff;
        font-size: 16px;
        margin: 0 0 8px 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .ai-production h3::before {
        content: '🎬';
      }
      .ai-production p {
        color: #888;
        font-size: 13px;
        margin: 0 0 12px 0;
        line-height: 1.5;
      }
      .lang-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .lang-tab {
        background: transparent;
        border: 1px solid #444;
        color: #666;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s;
      }
      .lang-tab:hover, .lang-tab.active {
        border-color: #ff6b4a;
        color: #ff6b4a;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Lightbox -->
    <div class="reelhk-lightbox" id="reelhkLightbox">
      <div class="reelhk-overlay" onclick="closeReelhkLightbox()"></div>
      <button class="reelhk-lightbox-close" onclick="closeReelhkLightbox()">&times;</button>
      <video id="reelhkVideo" controls autoplay></video>
    </div>

    <!-- AI Production Section -->
    <div class="ai-production" id="aiProduction">
      <div class="lang-tabs">
        <button class="lang-tab active" onclick="setLang('tc')">繁中</button>
        <button class="lang-tab" onclick="setLang('sc')">简中</button>
        <button class="lang-tab" onclick="setLang('en')">EN</button>
      </div>
      <h3 id="aiTitle">AI 無界創作</h3>
      <p id="aiDesc">想像即現實，品質即承諾</p>
    </div>

    <script>
      // Image filename to video mapping
      const imageToVideo = {
        'work-app': 'work_app1.mp4',
        'work-beauty': 'work_skincare.mp4', 
        'work-lifestyle': 'work_lifestyle.mp4',
        'work-retail': 'work_fashion.mp4',
        'work-tech': 'work_tech.mp4',
        'work-fnb': 'work_food.mp4'
      };

      const lightbox = document.getElementById('reelhkLightbox');
      const videoPlayer = document.getElementById('reelhkVideo');

      function openReelhkLightbox(videoSrc) {
        console.log('Opening video:', videoSrc);
        videoPlayer.src = videoSrc;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeReelhkLightbox() {
        console.log('Closing lightbox');
        lightbox.classList.remove('active');
        videoPlayer.pause();
        videoPlayer.src = '';
        document.body.style.overflow = '';
      }

      // Close on ESC key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeReelhkLightbox();
      });

      // AI Production Language Switcher
      const aiContent = {
        tc: { title: 'AI 無界創作', desc: '想像即現實，品質即承諾' },
        sc: { title: 'AI 无界创作', desc: '想象即现实，品质即承诺' },
        en: { title: 'AI Without Limits', desc: 'Where imagination becomes reality, quality is the promise' }
      };

      function setLang(lang) {
        document.querySelectorAll('.lang-tab').forEach(tab => tab.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('aiTitle').textContent = aiContent[lang].title;
        document.getElementById('aiDesc').textContent = aiContent[lang].desc;
      }

      // Find video based on image src or nearby text
      function findVideoForCard(img) {
        const src = img.src || '';
        const alt = img.alt || '';
        
        // Check image filename first
        for (const [key, video] of Object.entries(imageToVideo)) {
          if (src.includes(key) || alt.includes(key)) {
            return video;
          }
        }
        
        // Check parent elements for text clues
        let el = img.parentElement;
        for (let i = 0; i < 5 && el; i++) {
          const text = (el.innerText || el.textContent || '').toLowerCase();
          
          if (text.includes('餐飲') || text.includes('美食') || text.includes('fnb') || text.includes('food')) {
            return 'work_food.mp4';
          }
          if (text.includes('手機') || text.includes('app')) {
            return 'work_app1.mp4';
          }
          if (text.includes('零售') || text.includes('時尚') || text.includes('fashion')) {
            return 'work_fashion.mp4';
          }
          if (text.includes('生活') || text.includes('lifestyle')) {
            return 'work_lifestyle.mp4';
          }
          if (text.includes('美容') || text.includes('護理') || text.includes('beauty') || text.includes('skincare')) {
            return 'work_skincare.mp4';
          }
          if (text.includes('科技') || text.includes('產品') || text.includes('tech')) {
            return 'work_tech.mp4';
          }
          
          el = el.parentElement;
        }
        
        return null;
      }

      // Add click handlers
      function addClickHandlers() {
        const images = document.querySelectorAll('img');
        
        images.forEach(img => {
          if (img.dataset.reelhkHandled) return;
          
          const video = findVideoForCard(img);
          if (!video) return;
          
          // Find clickable container
          let container = img;
          let parent = img.parentElement;
          for (let i = 0; i < 3 && parent; i++) {
            const rect = parent.getBoundingClientRect();
            if (rect.width > 150 && rect.height > 100) {
              container = parent;
              break;
            }
            parent = parent.parentElement;
          }
          
          if (container.dataset.reelhkHandled) return;
          
          container.style.cursor = 'pointer';
          container.addEventListener('click', (e) => {
            if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;
            e.preventDefault();
            e.stopPropagation();
            console.log('Playing:', video);
            openReelhkLightbox(video);
          });
          
          container.dataset.reelhkHandled = 'true';
          img.dataset.reelhkHandled = 'true';
          console.log('Handler added:', video);
        });
      }

      // Initialize
      function init() {
        addClickHandlers();
        setTimeout(addClickHandlers, 1000);
        setTimeout(addClickHandlers, 2500);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }

      // Watch for DOM changes
      new MutationObserver(() => addClickHandlers()).observe(document.body, { 
        childList: true, 
        subtree: true 
      });
    </script>
  </body>
</html>
